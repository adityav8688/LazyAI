<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LazyAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="sideHead">
                <h3>LazyAI</h3>
                <button id="sidebarClo"><span class="material-symbols-outlined">close</span></button>
            </div>
            <div class="sideNew">
                <div class="newChat">
                    <p>New Chat</p>
                    <span class="material-symbols-outlined">comment</span>
                </div>
            </div>
            <div class="sideChats">

            </div>
            <div class="sideFoot">
                <h3>account</h3>
            </div>
        </aside>
        <header>
            <div class="topnav">
                <div class="sidebarBtn">
                    <button id="sidebarBtn"><span class="material-symbols-outlined">menu</span></button>
                </div>
                <div class="appIcon">
                    <h3>LazyAI</h3>
                </div>
                <div class="loginOrSignin">
                    <button><span class="material-symbols-outlined">login</span></button>
                </div>
            </div>
        </header>
        <div class="container" id="container">
            <main>
                <div class="basic" id="basicChat">
                    <div class="basicCnt" id="remove-1">
                        <h1>How can I help you?</h1>
                        <p>Ask me anything - write a code, ideas, or just a quick question.</p>
                    </div>
                    <div class="sugChips" id="remove-2">
                        <div class="chip1">
                            <span>✍️</span>
                            <h3>Write for me</h3>
                            <p>Emails, essays, captions</p>
                        </div>
                        <div class="chip2">
                            <span>💡</span>
                            <h3>Brainstorm</h3>
                            <p>ideas, names, palns</p>
                        </div>
                        <div class="chip3">
                            <span>💻</span>
                            <h3>Help with code</h3>
                            <p>Debug, explain, build</p>
                        </div>
                        <div class="chip4">
                            <span>📖</span>
                            <h3>Explain this</h3>
                            <p>simple breakdowns</p>
                        </div>
                    </div>
                </div>
                <div class="inputBar">
                    <div>
                        <div class="userInputDiv">
                            <textarea type="text" id="userInput" placeholder="Ask anything..."></textarea>
                        </div>
                        <div class="inputBtns">
                            <button><span class="material-symbols-outlined">attach_file</span></button>
                            <button id="sendBtn"><span class="material-symbols-outlined">send</span></button>
                        </div>
                    </div>
                </div>
            </main>

        </div>
        <footer>
            <div class="footnote">
                <span></span>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>

</html>
